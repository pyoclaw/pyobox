# Starship prompt config — lean, fast, informative
# pyobox managed — copy to ~/.config/starship.toml

# Don't print a newline before the prompt
add_newline = true

# Keep it minimal
format = """
$username\
$hostname\
$shlvl\
$directory\
$git_branch\
$git_state\
$git_status\
$pyobox\
$fill\
$cmd_duration\
$line_break\
$character"""

# --- Modules ---

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vicmd_symbol = "[❮](bold yellow)"

[hostname]
ssh_only = false
format = "@[$hostname](bold yellow) "

[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style) "

[git_branch]
format = "[$symbol$branch]($style) "
style = "bold purple"

[git_status]
conflicted = "🏳"
ahead = "⇡\${count}"
behind = "⇣\${count}"
diverged = "⇕⇡\${ahead_count}⇣\${behind_count}"
up_to_date = "✓"
untracked = "?$count"
stashed = "📦"
modified = "!$count"
staged = "+$count"
renamed = "»$count"
deleted = "✘$count"

[cmd_duration]
min_time = 2000
format = "⏱️ [$duration]($style) "

[nodejs]
format = "via [⬢ $version](bold green) "

[rust]
format = "via [🦀 $version](bold red) "

[python]
format = "via [🐍 $version](bold blue) "

# Custom pyobox module
[custom.pyobox]
description = "Shows pyobox environment marker"
command = "echo pyobox"
when = """
  test -n "${PYOBOX_ENV:-}"
"""
shell = "bash"
style = "bold cyan"
format = "[■ $output]($style) "
