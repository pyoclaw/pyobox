# Starship prompt config for pyobox
# Minimal, fast, informative

format = """\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_metrics\
$fill\
$python\
$rust\
$nodejs\
$cmd_duration\
$line_break\
$character\
"""

[character]
success_symbol = "[➜](green)"
error_symbol = "[➜](red)"

[directory]
truncation_length = 3

[git_branch]
format = " [$symbol$branch]($style)"
style = "purple"

[git_status]
format = '[$all_status$ahead_behind]($style)'
conflicted = "🏳"
up_to_date = ""
untracked = "?"
stashed = "📦"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"
style = "cyan"

[git_metrics]
format = "([+$added]($added_style))([-$deleted]($deleted_style))"
added_style = "bold green"
deleted_style = "bold red"
disabled = false

[python]
format = "[$symbol$version]($style) "
style = "yellow bold"

[rust]
format = "[$symbol$version]($style) "
style = "red bold"

[nodejs]
format = "[$symbol$version]($style) "
style = "green bold"

[cmd_duration]
format = "⏱ [$duration]($style)"
style = "yellow"

[fill]
symbol = " "

[hostname]
ssh_only = true
format = "@[$hostname](red bold)"
